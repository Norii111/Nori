<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Command Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="portal-container">
        <aside class="sidebar-panel">
            <h1 class="manga-logo">夢 <br>幻 </h1>
            <nav class="nav-links">
                <a href="#" class="active" onclick="switchTab('dashboard')">COMMAND CENTER</a>
                <a href="#" onclick="switchTab('searchTab')">SEARCH ENGINE</a>
                <a href="#" onclick="switchTab('logs')">SYSTEM LOGS</a>
                <a href="#" onclick="requestDeveloperAccess()" style="border-top: 2px solid var(--ink-black); margin-top: 10px;">[ DEV VAULT ]</a>
            </nav>
            <div class="blank-character-frame sidebar-art"></div>
        </aside>

        <main class="main-content" id="dashboardTab">
            <section class="manga-panel primary-gas-panel">
                <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3>Workspace Centralizer</h3>
                    <div class="button-group" style="display: flex; gap: 6px;">
                        <button class="manga-btn" onclick="launchMainGAS()">Launch Script</button>
                        <button class="manga-btn primary-save" onclick="savePrimaryGAS()">Save Changes</button>
                        <button class="manga-btn" onclick="copyTextAreaContent()">Copy Paper</button>
                    </div>
                </div>
                <textarea id="primaryGasArea" placeholder="Loading script content..."></textarea>
            </section>
            <section class="manga-panel bottom-overflow-panel">
                <div class="panel-header">
                    <h3>USERSCRIPTS & RANDOM TEXT</h3>
                    <button class="manga-btn" onclick="openModal()">+ Add New Note</button>
                </div>
                <div class="bottom-item-grid" id="bottomGrid"></div>
            </section>
        </main>

        <main class="main-content" id="searchMenuTab" style="display: none;">
            <section class="manga-panel" style="grid-row: span 2; display: flex; flex-direction: column;">
                <div class="panel-header">
                    <h3>Live Sheet Query Deck</h3>
                </div>
                <input type="text" id="sheetKeySearch" placeholder="Type keyword..." oninput="querySheetMatrix()">
                <div id="searchHistoryContainer" style="display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0;"></div>
                <div id="searchSuggestions" style="display: none;"></div>
                <textarea id="sheetPayloadArea" readonly style="display: none; flex-grow: 1;"></textarea>
            </section>
        </main>

        <main class="main-content" id="logsTab" style="display: none;">
            <section class="manga-panel" style="height: 100%;">
                <h3>SYSTEM LOGS</h3>
                <textarea readonly id="systemLogsArea"></textarea>
            </section>
        </main>

        <main class="main-content" id="developerTab" style="display: none;">
            <section class="manga-panel" style="height: 100%;">
                <h3>DEVELOPER VAULT</h3>
                <div id="devSheetContainer" style="padding: 10px; border: 3px solid var(--ink-black);">
                    <p style="font-weight: 900;">Access Authorized. Read/Write active.</p>
                </div>
            </section>
        </main>
    </div>

    <div id="mangaModal" class="modal-overlay">...</div>
    <div id="chessAuthModal" class="modal-overlay">...</div>
    <div id="toastContainer" class="toast-container"></div>

    <script src="app.js" defer></script>
</body>
</html>
