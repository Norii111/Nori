<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Command Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="portal-container">
        <aside class="sidebar-panel">
            <h1 class="manga-logo">夢 <br>幻 </h1>
            <nav class="nav-links">
                <a href="#" class="active" onclick="switchTab('dashboard')">COMMAND CENTER</a>
                <a href="#" onclick="switchTab('searchTab')">SEARCH ENGINE</a>
                <a href="#" onclick="switchTab('logs')">SYSTEM LOGS</a>
            </nav>
            <div class="blank-character-frame sidebar-art"></div>
        </aside>

        <main class="main-content" id="dashboardTab">
            <section class="manga-panel primary-gas-panel">
                <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3>Workspace Centralizer</h3>
                    <div class="button-group" style="display: flex; gap: 6px;">
                        <button class="manga-btn" style="font-size: 11px; padding: 4px 10px;" onclick="launchMainGAS()">Launch Script</button>
                        <button class="manga-btn primary-save" style="font-size: 11px; padding: 4px 10px;" onclick="savePrimaryGAS()">Save Changes</button>
                        <button class="manga-btn" style="font-size: 11px; padding: 4px 10px;" onclick="copyTextAreaContent()">Copy Paper</button>
                    </div>
                </div>
                <textarea id="primaryGasArea" placeholder="Loading script content..."></textarea>
            </section>

            <section class="manga-panel bottom-overflow-panel">
                <div class="panel-header">
                    <h3>USERSCRIPTS & RANDOM TEXT</h3>
                    <button class="manga-btn" onclick="openModal()">+ Add New Note</button>
                </div>
                <div class="bottom-item-grid" id="bottomGrid"></div>
            </section>
        </main>

        <main class="main-content" id="searchMenuTab" style="display: none;">
            <section class="manga-panel" style="grid-row: span 2; display: flex; flex-direction: column; overflow: visible;">
                <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3>Live Sheet Query Deck</h3>
                    <div style="display: flex; gap: 6px;">
                        <button class="manga-btn" style="font-size: 11px; padding: 4px 10px; background: #e3ebd9;" onclick="syncGoogleSheetData()">🔄 Pull Fresh Data</button>
                        <button class="manga-btn" style="font-size: 11px; padding: 4px 10px;" onclick="toggleArchiveView()">👁️ Archive Overview</button>
                    </div>
                </div>
                
<div style="display: flex; flex-direction: column; gap: 10px;">
    
    <input type="text" id="sheetKeySearch" ... >

    <div id="searchSuggestions" style="display: none; width: 100%; background: var(--bg-paper); border: 3px solid var(--ink-black); max-height: 200px; overflow-y: auto;"></div>

    <div id="searchHistoryContainer" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>

</div>

                <div id="searchActionsHeader" style="display: none; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h4 id="payloadPanelTitle" style="margin: 0; font-size: 12px; letter-spacing: 0.5px;">PROCESSED DESCRIPTIONS</h4>
                    <div id="searchButtonGroup" style="display: flex; gap: 6px;">
                        <button class="manga-btn" style="font-size: 11px; padding: 4px 10px;" onclick="copySearchPayload()">📋 Copy Text (Alt+C)</button>
                    </div>
                </div>

                <textarea id="sheetPayloadArea" readonly placeholder="Matching Column B description will materialize here..." style="display: none; flex-grow: 1; margin-top: 0;"></textarea>
                
                <div id="sheetArchiveArea" style="display: none; flex-grow: 1; border: 3px solid var(--ink-black); background: var(--bg-paper); overflow-y: auto; padding: 10px; box-sizing: border-box; gap: 8px;"></div>
            </section>
        </main>

        <main class="main-content" id="logsTab" style="display: none;">
            <section class="manga-panel" style="height: 100%;">
                <h3>SYSTEM LOGS</h3>
                <textarea readonly id="systemLogsArea">// System running cleanly offline...
[INFO] Portal initialized successfully.</textarea>
            </section>
        </main>
    </div>

    <div id="mangaModal" class="modal-overlay">
        <div class="modal-panel">
            <h3>[ NEW CREATION ENTRY ]</h3>
            <label for="modalInput" style="display:block; margin-bottom:10px; font-size:12px;">ENTER UNIQUE TITLE:</label>
            <input type="text" id="modalInput" placeholder="e.g., Target Site Macro">
            <div class="modal-buttons">
                <button class="manga-btn" onclick="closeModal()">Cancel</button>
                <button class="manga-btn" onclick="submitNewNote()">Confirm</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <div id="chessAuthModal" class="modal-overlay">
        <div class="modal-panel" style="width: 240px; padding: 18px; border: 6px solid var(--ink-black); box-shadow: 10px 10px 0px var(--ink-black);">
            <h3 style="margin: -5px 0 10px 0; padding: 4px 8px; background: var(--ink-black); color: var(--bg-paper); transform: rotate(-2deg); font-size: 13px; display: inline-block; letter-spacing: 0.5px;">
                [ DEFENSE MATRIX ]
            </h3>
            <p style="font-size: 10px; margin: 0 auto; max-width: 200px; color: #111; font-weight: bold; text-transform: uppercase; line-height: 1.3;">
                Execute London Line to Authorize Deletion
            </p>
            <div id="mangaChessBoard" class="chess-matrix-board"></div>
            <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 8px; align-items: center;">
                <span id="chessStepIndicator" style="font-size: 11px; font-weight: 900; background: #e5e1d5; border: 2px solid var(--ink-black); padding: 2px 6px;">
                    STEP 1: Play 1.d4
                </span>
                <button class="manga-btn danger" style="padding: 2px 8px; font-size: 10px; width: 100%; text-align: center;" onclick="closeChessModal()">
                    Abort Defend
                </button>
            </div>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
